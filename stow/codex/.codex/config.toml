model = "gpt-5.5"
model_reasoning_effort = "medium"
model_verbosity = "medium"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"
personality = "pragmatic"

notify = ["bash", "-lc", "~/.codex/hooks/notify.sh"]

[features]
hooks = true

[tui]
notifications = true
notification_method = "auto"
alternate_screen = "auto"
show_tooltips = true
status_line_use_colors = true
status_line = [
  "current-dir",
  "git-branch",
  "model-with-reasoning",
  "context-remaining",
  "five-hour-limit",
  "used-tokens",
  "run-state",
  "activity",
  "task-progress",
]
terminal_title = [
  "thread-title",
  "run-state",
]

[tui.model_availability_nux]
"gpt-5.5" = 3

[shell_environment_policy]
inherit = "core"
exclude = [
  ".*TOKEN.*",
  ".*SECRET.*",
  ".*KEY.*",
  ".*PASSWORD.*",
  ".*CREDENTIAL.*",
]

[apps._default]
enabled = true
destructive_enabled = false
open_world_enabled = false

[mcp_servers.context7]
command = "npx"
args = ["@upstash/context7-mcp@latest"]
enabled = true
required = false
startup_timeout_sec = 20
tool_timeout_sec = 60

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]
enabled = true
required = false
startup_timeout_sec = 20
tool_timeout_sec = 120

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "CODEX_GITHUB_PERSONAL_ACCESS_TOKEN"
enabled = true
required = false

[mcp_servers.hourei]
command = "npx"
args = ["hourei-mcp-server"]
enabled = true
required = false
startup_timeout_sec = 20
tool_timeout_sec = 60

[mcp_servers.tax-law]
command = "npx"
args = ["tax-law-mcp"]
enabled = true
required = false
startup_timeout_sec = 20
tool_timeout_sec = 60

[mcp_servers.mf-ca]
url = "https://beta.mcp.developers.biz.moneyforward.com/mcp/ca/v3"
enabled = true
required = false

[projects."/Users/otkshol/00_otake-ya"]
trust_level = "trusted"

[projects."/Users/otkshol/dotfiles"]
trust_level = "trusted"

[projects."/Users/otkshol/Library/Mobile Documents/iCloud~md~obsidian/Documents/obsidian"]
trust_level = "trusted"

[projects."/Users/otkshol/00_otake-ya/projects/web/my-portfolio"]
trust_level = "trusted"

[profiles.fast]
model = "gpt-5.4-mini"
model_reasoning_effort = "low"
model_verbosity = "low"

[profiles.deep]
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
model_verbosity = "medium"

[profiles.review]
model = "gpt-5.5"
model_reasoning_effort = "high"
model_verbosity = "medium"
approval_policy = "on-request"

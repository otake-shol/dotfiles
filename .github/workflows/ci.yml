name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: '0 0 * * 1'  # 毎週月曜 00:00 UTC（versions-audit のみ）
  workflow_dispatch:

jobs:
  lint:
    name: ShellCheck + Syntax + Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y stow shellcheck zsh

      - name: ShellCheck
        run: make lint

      - name: README stats check
        run: make readme-check

      - name: Stow conflict detection (dry run)
        run: make check-strict

      - name: Zsh syntax check
        run: find stow/zsh -type f -name '*.zsh' -exec zsh -n {} +

      - name: Validate (TOML/JSON/absolute-path/local-state)
        run: make validate

  brewfile:
    name: Brewfile validation
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Brewfile syntax
        run: |
          if ! brew bundle check --file=Brewfile --no-upgrade 2>&1; then
            echo "::warning::Brewfile syntax check failed (some packages may not be installed locally)"
          fi

      - name: Check all packages are available
        run: |
          errors=0
          while IFS= read -r line; do
            # tap行はスキップ
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            [[ -z "$line" ]] && continue

            if [[ "$line" =~ ^brew\ \"([^\"]+)\" ]]; then
              pkg="${BASH_REMATCH[1]}"
              if ! brew info "$pkg" &>/dev/null; then
                echo "::error::Formula not found: $pkg"
                errors=$((errors + 1))
              fi
            elif [[ "$line" =~ ^cask\ \"([^\"]+)\" ]]; then
              pkg="${BASH_REMATCH[1]}"
              if ! brew info --cask "$pkg" &>/dev/null; then
                echo "::error::Cask not found: $pkg"
                errors=$((errors + 1))
              fi
            fi
          done < Brewfile
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors package(s) not found in Homebrew"
            exit 1
          fi
          echo "✓ All Brewfile packages are available"

  bootstrap:
    name: Bootstrap dry-run
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap dry-run
        run: bash bootstrap.sh --dry-run --yes

      - name: Bootstrap dry-run with empty HOME
        run: |
          FAKE_HOME="$(mktemp -d)"
          HOME="$FAKE_HOME" bash bootstrap.sh --dry-run --yes

      - name: Stow install (dry-run)
        run: |
          brew install stow
          make check

  versions-audit:
    name: asdf versions audit (informational)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Install asdf
        run: |
          git clone https://github.com/asdf-vm/asdf.git "$HOME/.asdf" --branch v0.14.1 --depth 1
          echo "$HOME/.asdf/bin" >> "$GITHUB_PATH"
          echo "$HOME/.asdf/shims" >> "$GITHUB_PATH"

      - name: Add asdf plugins
        continue-on-error: true
        run: |
          while read -r tool _ _; do
            [ -z "$tool" ] && continue
            case "$tool" in \#*) continue ;; esac
            asdf plugin add "$tool" 2>/dev/null || true
          done < stow/asdf/.tool-versions

      - name: Versions audit (informational, never fails CI)
        continue-on-error: true
        run: make versions-audit

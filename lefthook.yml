# lefthook - Git Hooks
# Install: brew install lefthook && lefthook install

pre-commit:
  parallel: true
  skip: [merge, rebase]
  commands:
    shellcheck:
      glob: "*.sh"
      run: shellcheck -S warning {staged_files}

    zsh-syntax:
      glob: "*.zsh"
      run: |
        for f in {staged_files}; do zsh -n "$f" || exit 1; done

    secrets:
      run: git secrets --scan --cached

commit-msg:
  commands:
    conventional-commit:
      run: |
        grep -qE "^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?: .+" {1} || {
          echo "❌ Conventional Commits: <type>(<scope>): <subject>"; exit 1
        }

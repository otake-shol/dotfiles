# lefthook - Git Hooks
# Install: brew install lefthook && lefthook install

pre-commit:
  parallel: true
  skip:
    - merge
    - rebase
  commands:
    shellcheck:
      glob: "*.sh"
      run: shellcheck -S warning {staged_files}

    yamllint:
      glob: "*.{yml,yaml}"
      run: yamllint -d relaxed {staged_files}

    zsh-syntax:
      glob: "*.zsh"
      run: |
        for f in {staged_files}; do zsh -n "$f" || exit 1; done

    protected-vars:
      glob: "*.{zsh,sh}"
      run: |
        for f in {staged_files}; do
          if grep -qE "unset.+(ZSH_CONFIG_DIR|DOTFILES_DIR|HOME|PATH|SHELL)" "$f"; then
            echo "❌ $f: 保護された変数をunsetしています" && exit 1
          fi
        done

    secrets:
      run: git secrets --scan --cached

    trailing-whitespace:
      run: git diff --check --cached

commit-msg:
  commands:
    conventional-commit:
      run: |
        msg=$(cat {1})
        echo "$msg" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?: .+" || {
          echo "❌ Conventional Commits形式で記述してください: <type>(<scope>): <subject>"
          exit 1
        }

pre-push:
  commands:
    branch-protection:
      run: |
        branch=$(git rev-parse --abbrev-ref HEAD)
        [[ "$branch" == "main" || "$branch" == "master" ]] && \
          echo "⚠️  main/masterへの直接プッシュは非推奨です" || true

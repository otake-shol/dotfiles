approval_policy = "on-request"
approvals_reviewer = "auto_review"
model = "gpt-5.6-terra"
model_reasoning_effort = "medium"
model_verbosity = "low"
personality = "pragmatic"
sandbox_mode = "workspace-write"
web_search = "cached"

# notify は computer-use プラグインが端末固有の絶対パスへ書き換えることがある。
# コミット時はポータブルな notify.sh に戻す（プラグインは初回起動時に必要なら再設定する）。
notify = [
    "bash",
    "-lc",
    "~/.codex/hooks/notify.sh",
]

[sandbox_workspace_write]
network_access = true

[agents]
max_depth = 1
max_threads = 3

[apps._default]
destructive_enabled = false
enabled = true
open_world_enabled = false

[features]
hooks = true
js_repl = false


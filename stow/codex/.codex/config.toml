approval_policy = "on-request"
model = "gpt-5.5"
model_reasoning_effort = "medium"
model_verbosity = "medium"
notify = [
    "bash",
    "-lc",
    "~/.codex/hooks/notify.sh",
]
personality = "pragmatic"
sandbox_mode = "workspace-write"
web_search = "cached"

[apps._default]
destructive_enabled = false
enabled = true
open_world_enabled = false

[features]
hooks = true

[mcp_servers.app-store-connect-review]
command = "~/.codex/bin/app-store-connect-review-mcp.mjs"
enabled = true
required = false
startup_timeout_sec = 20
tool_timeout_sec = 120

[mcp_servers.app-store-connect-review.tools.asc_create_app_store_review_attachment]
approval_mode = "approve"

[mcp_servers.app-store-connect-review.tools.asc_create_app_store_review_detail]
approval_mode = "approve"

[mcp_servers.app-store-connect-review.tools.asc_list_app_store_versions]
approval_mode = "approve"

[mcp_servers.app-store-connect-review.tools.asc_list_apps]
approval_mode = "approve"

[mcp_servers.app-store-connect-review.tools.asc_update_app_store_review_detail]
approval_mode = "approve"

[mcp_servers.context7]
args = ["@upstash/context7-mcp@latest"]
command = "npx"
enabled = true
required = false
startup_timeout_sec = 20
tool_timeout_sec = 60

[mcp_servers.github]
bearer_token_env_var = "CODEX_GITHUB_PERSONAL_ACCESS_TOKEN"
enabled = false
required = false
url = "https://api.githubcopilot.com/mcp/"

[mcp_servers.hourei]
args = ["hourei-mcp-server"]
command = "npx"
enabled = true
required = false
startup_timeout_sec = 20
tool_timeout_sec = 60

[mcp_servers.hourei.tools.get_law_data]
approval_mode = "approve"

[mcp_servers.hourei.tools.search_law]
approval_mode = "approve"

[mcp_servers.mf-ca]
enabled = false
required = false
url = "https://beta.mcp.developers.biz.moneyforward.com/mcp/ca/v3"

[mcp_servers.playwright]
args = ["@playwright/mcp@latest"]
command = "npx"
enabled = true
required = false
startup_timeout_sec = 20
tool_timeout_sec = 120

[mcp_servers.playwright.tools.browser_close]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_evaluate]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_navigate]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_resize]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_run_code_unsafe]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_tabs]
approval_mode = "approve"

[mcp_servers.tax-law]
args = ["tax-law-mcp"]
command = "npx"
enabled = true
required = false
startup_timeout_sec = 20
tool_timeout_sec = 60

[profiles.deep]
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
model_verbosity = "medium"

[profiles.fast]
model = "gpt-5.4-mini"
model_reasoning_effort = "low"
model_verbosity = "low"

[profiles.review]
approval_policy = "on-request"
model = "gpt-5.5"
model_reasoning_effort = "high"
model_verbosity = "medium"

[shell_environment_policy]
exclude = [
    ".*TOKEN.*",
    ".*SECRET.*",
    ".*KEY.*",
    ".*PASSWORD.*",
    ".*CREDENTIAL.*",
]
inherit = "core"

[shell_environment_policy.set]
CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS = "1"

[tui]
alternate_screen = "auto"
notification_method = "auto"
notifications = true
show_tooltips = true
status_line = [
    "current-dir",
    "git-branch",
    "model-with-reasoning",
    "context-remaining",
    "five-hour-limit",
    "used-tokens",
    "run-state",
    "activity",
    "task-progress",
]
status_line_use_colors = true
terminal_title = [
    "thread-title",
    "run-state",
]

[tui.model_availability_nux]
"gpt-5.5" = 1

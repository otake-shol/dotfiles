name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y stow shellcheck zsh

      - name: ShellCheck
        run: shellcheck -S warning bootstrap.sh

      - name: Stow conflict detection (dry run)
        run: |
          for pkg in $(make -s packages); do
            echo "=== $pkg ==="
            stow --simulate -v --target="$HOME" --dir=stow --restow "$pkg" 2>&1 || {
              echo "::error::Stow conflict detected in package: $pkg"
              exit 1
            }
          done

      - name: Zsh syntax check
        run: find stow/zsh -type f -name '*.zsh' -exec zsh -n {} +
